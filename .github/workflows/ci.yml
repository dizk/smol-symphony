name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history
      - uses: actions/setup-node@v4
        with:
          # Gondolin (the VM substrate) requires Node >=23.6; match the host runtime.
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint:arch # dependency-cruiser: import direction + hexagonal (fails on NEW violations)
      - run: npm run lint # eslint: core purity + shell complexity ratchet (--max-warnings)
      - run: npm test
      - run: npm run build
