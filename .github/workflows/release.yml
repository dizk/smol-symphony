name: release

# Fires when a GitHub Release is published (draft → published transition).
# Verifies the tag matches package.json's version, runs the full check pipeline,
# and publishes to npm with provenance attached.
#
# Required: NPM_TOKEN secret with publish rights to `smol-symphony`.
# Recommended: create the release with the tag `v<version>` (e.g. `v0.2.0`).

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          set -eu
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          # Accept either `v0.2.0` or bare `0.2.0` as the tag.
          if [ "${TAG}" != "v${PKG_VERSION}" ] && [ "${TAG}" != "${PKG_VERSION}" ]; then
            echo "Tag ${TAG} does not match package.json version ${PKG_VERSION}" >&2
            exit 1
          fi

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: npm publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
